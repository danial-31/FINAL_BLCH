specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AMMPool
    network: arbitrum-sepolia
    source:
      # Update address after deployment
      address: "0x0000000000000000000000000000000000000000"
      abi: AMMPool
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Swap
        - LiquidityEvent
        - Pool
      abis:
        - name: AMMPool
          file: ./abis/AMMPool.json
      eventHandlers:
        - event: Swap(indexed address,address,uint256,uint256)
          handler: handleSwap
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
      file: ./src/mapping.ts
